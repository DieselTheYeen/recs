<html>
    <script>
        const title = "Dragonspire Base"
        const template = {
            "body": [
                ["https://ik.imagekit.io/dzl/dragonspire/base-tao/example10.png", "Body"]
            ],
            "horns": [
                ["", "None"],
                ["https://ik.imagekit.io/dzl/dragonspire/base-tao/example04.png", "Wolf"],
                ["https://ik.imagekit.io/dzl/dragonspire/base-tao/example05.png", "Dragon"],
                ["https://ik.imagekit.io/dzl/dragonspire/base-tao/example06.png", "Minx"]
            ],
            "tail": [
                ["https://ik.imagekit.io/dzl/dragonspire/base-tao/example01.png", "Wolf"],
                ["https://ik.imagekit.io/dzl/dragonspire/base-tao/example02.png", "Dragon"],
                ["https://ik.imagekit.io/dzl/dragonspire/base-tao/example03.png", "Leopard"]
            ],
            "feet": [
                ["https://ik.imagekit.io/dzl/dragonspire/base-tao/example07.png", "Wolf"],
                ["https://ik.imagekit.io/dzl/dragonspire/base-tao/example08.png", "Dragon"],
                ["https://ik.imagekit.io/dzl/dragonspire/base-tao/example09.png", "Flamingo"]
            ]
        };

        // populated later with choice index
        const options = {};

        // Instruct the browser to begin loading all images right away
        // This allows users to cycle between options without needing to wait for each to load
        function preloadParts() {
            const img = new Image();
            for (const part in template) {
                for (const i in template[part]) {
                    const url = template[part][i][0];
                    if (url) {
                        document.head.innerHTML += `<link rel="preload" as="image" href="${url}">`;
                    }
                }
            }
        }

        // Place a single img for each template part
        function buildPreview() {
            let html = "";
            for (const part in template) {
                options[part] = 0;
                const defaultsrc = template[part][0][0];
                html += `<img id="${part}" src="${defaultsrc}" crossOrigin="anonymous" onerror="this.style.display='none'">`;
            }
            document.getElementById("preview").innerHTML = html;
        }

        // Create a contorl to switch between each selected option
        function buildControls() {
            let html = "";
            for (const part in template) {
                // Only build controls for parts with more than 1 option.
                if (template[part].length   > 1) {
                    html += `
                        <div class="row">
                            <h3>${part}</h3>
                            <div class="option-group">
                                <button onclick="change('${part}', -1)"><img src="https://ik.imagekit.io/dzl/gen/arrow.png?tr=rt-270,w-80,e-colorize-co-FFFFFF"></button>
                                <span id="label-${part}">${template[part][0][1]}</span>
                                <button onclick="change('${part}', 1)"><img src="https://ik.imagekit.io/dzl/gen/arrow.png?tr=rt-90,w-80,e-colorize-co-FFFFFF"></button>
                            </div>
                        </div>`;
                }
            }

            html += `<div><button id="download" onclick="download()">Download</button></div>`;

            document.getElementById("controls").innerHTML = html;
        }

        function change(part, direction) {
            options[part] = wrap(options[part] + direction, template[part].length);
            document.getElementById(part).src = template[part][options[part]][0];
            if (template[part][options[part]][0] != "") {
                document.getElementById(part).style.display="";
            } else {
                document.getElementById(part).style.display="none";
            }
            document.getElementById(`label-${part}`).innerText = template[part][options[part]][1]
        }

        function wrap(input, max) {
            return (input % max + max) % max;
        }

        function download() {
            const canvas = document.createElement("canvas");
            canvas.width = document.getElementById(Object.entries(options)[0][0]).naturalWidth;
            canvas.height = document.getElementById(Object.entries(options)[0][0]).naturalHeight;
            const ctx = canvas.getContext("2d");
            let filename = `${title} `;

            for (layer in options) {
                ctx.drawImage(document.getElementById(layer), 0, 0);
                filename += options[layer];
            }
            
            console.log("Download: " + canvas.toDataURL("image/png"));

            const link = document.createElement("a");
            link.download = `${filename}.png`.replaceAll(" ", "-");
            link.href = canvas.toDataURL("image/png");
            link.click();
            link.remove();
        }


        document.title = title;
        window.addEventListener("DOMContentLoaded", preloadParts);
        window.addEventListener("DOMContentLoaded", buildPreview);
        window.addEventListener("DOMContentLoaded", buildControls);

    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cinzel+Decorative');

        body {
            font-family: "Cinzel Decorative";
            background: url('https://ik.imagekit.io/dzl/dragonspire/krZJzYo.png') center / cover no-repeat fixed;
            color: white;
            margin: 80px auto 0px;
            max-width: 600px;
        }

        #preview {
            position: relative;
            width: 100%;
            max-width: 602px;
            aspect-ratio: 6/4;
            margin: auto;
            background: #aaa repeating-conic-gradient(#bbb 0 25%, #0000 0 50%) 50% / 20px 20px;
            border: 1px solid #06547a;
            border-width: 1px 1px 0px 1px;
            box-sizing: border-box;
            
            & img {
                display: unset;
                position: absolute;
                inset: 0;
                width: inherit;
                height: inherit;
                pointer-events: none;
            }
        }

        #controls {
            justify-items: center;
            padding: 2em;
            background: #0009;
            border: 1px solid #06547a;

            .row {
                justify-content: center;
                background: #131720D0;
                border: 1px solid #06547a;
                margin: 10px 0px;
            }

            h3 {
                text-transform: uppercase;
                text-align: center;
                margin: 0px;
            }

            .option-group {
                display: flex;
                width: 100vw;
                max-width: 400px;
            
                span {
                    display: inline-block;
                    width: 200px;
                    text-align: center;
                    font-size: 12px;
                    padding-top: 10px;
                    flex: 1;
                }

                button {
                transform: translateY(-10px);
                    & img {
                        pointer-events: none;
                    }
                    &:hover {
                        filter: drop-shadow(0 0 6px white);
                    }
                }
            }

            button {
                all: unset;
                padding: 10px;
                font: 20px "Cinzel Decorative";
                cursor: pointer;
                background: none;
            }
        }
        #download {
            background: #0009 !important;
            border: 1px solid #06547a !important;

            &:hover {
                filter: none !important;
                border: 1ps solid #0b83bd;
                box-shadow: 0 0 12px #096a99;
            }
        }
    </style>
    <head>
    </head>
    <body>
        <h1 style="text-align: center;">Dragonspire Armada</h1>
        <div id="preview">
            <img id="body" src="https://ik.imagekit.io/dzl/dragonspire/base-tao/example10.png">
            <img id="horns" src="">
            <img id="tail" src="">
            <img id="feet" src="">
        </div>
        <div id="controls"></div>

    </body>
</html>
